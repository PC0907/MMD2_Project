inherit: base.yaml
output_dir: outputs/qud
llm_model: Qwen/Qwen3.5-4B   # same backbone as baseline_llm
llm_cache: outputs/llm_cache.sqlite            # shared cache across runs
tensor_parallel: 2
max_model_len: 8192
temperature: 0.0
max_tokens: 512

# Stage 1
max_quds: 3
# Stage 2
use_embedding_features: true
use_nli_features: true
embedding_model: sentence-transformers/all-mpnet-base-v2
nli_model: microsoft/deberta-v3-large-mnli
# Stage 3: "rule" (zero-parameter taxonomy rules) or "learned" (HGB head)
head: rule
