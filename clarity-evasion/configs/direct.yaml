# Direct clarity baseline (the encoder ceiling / ablation).
pipeline: direct
model_name: microsoft/deberta-v3-base
max_len: 384
dev_size: 0.15
use_class_weights: true
epochs: 6
lr: 2.0e-5
batch_size: 16
warmup_ratio: 0.1
early_stopping_patience: 2
fp16: true
seed: 42
output_dir: runs/direct-deberta
